<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#E8547A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ludmila">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ludmila</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --p1:#E8547A;--p2:#F2789A;--p3:#F9ADBF;--p4:#FCDDE7;--p5:#FEF3F6;
  --deep:#BF3A5E;--ink:#3D1020;--sub:#A0607A;--ghost:#C9A0B0;
  --g:rgba(255,255,255,.72);--sh:0 6px 32px rgba(191,58,94,.11);--sh2:0 18px 56px rgba(191,58,94,.18);
  --r:22px;--nw:230px;
}
html,body{height:100%;background:#FDF0F5}
body{font-family:'Jost',sans-serif;color:var(--ink);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-2;background:
  radial-gradient(ellipse 70% 60% at 10% 5%,#FFD6E866,transparent 65%),
  radial-gradient(ellipse 55% 65% at 92% 12%,#FFBDCC55,transparent 58%),
  radial-gradient(ellipse 60% 45% at 50% 98%,#F9ADBF2A,transparent 60%),
  linear-gradient(155deg,#FFF8FA 0%,#FCE8F2 45%,#F8D4E2 100%)}
body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1' fill='%23E8547A'/%3E%3C/svg%3E");background-size:40px 40px}

/* MOBILE */
.shell{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto}
.hdr{position:sticky;top:0;z-index:90;height:62px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,rgba(252,219,229,.96),rgba(254,240,244,.88));
  backdrop-filter:blur(28px);border-bottom:1px solid rgba(255,255,255,.55);box-shadow:0 2px 20px rgba(191,58,94,.08)}
.logo-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:27px;color:var(--deep);letter-spacing:2px;line-height:1}
.logo-dots{display:flex;gap:4px;margin-top:3px;justify-content:center}
.logo-dot{width:3px;height:3px;border-radius:50%;background:var(--p3)}
.cnt{flex:1;padding:18px 16px 100px;overflow-y:auto}
.nmob{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:90;
  background:rgba(255,248,251,.97);backdrop-filter:blur(28px);
  border-top:1px solid rgba(255,205,220,.4);padding:8px 0 14px;display:flex;
  box-shadow:0 -4px 28px rgba(191,58,94,.08)}
.ndesk{display:none}
.nb{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;color:var(--ghost);padding:2px 0;transition:all .28s cubic-bezier(.34,1.56,.64,1);
  font-family:'Jost',sans-serif;font-weight:500;font-size:7.5px;letter-spacing:.6px;
  text-transform:uppercase;position:relative}
.nb.on{color:var(--p1)}
.nb.on::after{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:24px;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--p1),var(--p2))}
.nb svg{transition:transform .28s cubic-bezier(.34,1.56,.64,1)}
.nb.on svg{transform:translateY(-2px) scale(1.08)}

/* DESKTOP */
@media(min-width:900px){
  .shell{max-width:100%;flex-direction:row;height:100vh}
  .hdr{display:none}
  .cnt{padding:28px 36px 28px;flex:1;overflow-y:auto;max-height:100vh}
  .nmob{display:none}
  .ndesk{display:flex;flex-direction:column;width:var(--nw);min-width:var(--nw);
    background:rgba(255,245,249,.96);backdrop-filter:blur(28px);
    border-right:1px solid rgba(255,205,220,.35);padding:32px 0 24px;
    box-shadow:4px 0 32px rgba(191,58,94,.07);overflow-y:auto}
  .dlogo{padding:0 24px 28px;border-bottom:1px solid rgba(255,205,220,.25);margin-bottom:14px}
  .dlogo-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:30px;color:var(--deep);letter-spacing:2px;line-height:1}
  .dlogo-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--sub);letter-spacing:1px;margin-top:3px}
  .dlogo-dots{display:flex;gap:4px;margin-top:6px}
  .dlogo-dot{width:4px;height:4px;border-radius:50%;background:var(--p3)}
  .nb{flex:none;flex-direction:row;justify-content:flex-start;gap:12px;padding:11px 22px;
    border-radius:0 18px 18px 0;margin:2px 14px 2px 0;font-size:12px;letter-spacing:.5px;color:var(--sub)}
  .nb.on{background:linear-gradient(135deg,rgba(232,84,122,.1),rgba(242,120,154,.06));color:var(--p1)}
  .nb.on::after{top:50%;left:0;transform:translateY(-50%);width:3px;height:26px;border-radius:0 3px 3px 0}
  .nb svg{transform:none!important}
  .nb.on svg{transform:scale(1.08)!important}
  .dinst{margin-top:auto;padding:16px 20px 0;border-top:1px solid rgba(255,205,220,.25)}
  .dinst-btn{width:100%;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border:none;
    border-radius:14px;padding:11px;font-family:'Jost',sans-serif;font-weight:500;font-size:12px;
    cursor:pointer;box-shadow:0 4px 16px rgba(232,84,122,.28);transition:all .2s;
    display:flex;align-items:center;justify-content:center;gap:8px}
  .dinst-btn:hover{transform:translateY(-2px)}
}

/* SHARED */
.fade{animation:fu .35s cubic-bezier(.22,.68,0,1.15) both}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.slbl{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:13px;
  color:var(--sub);letter-spacing:.5px;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.slbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(232,84,122,.15),transparent)}
.tr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tr .slbl{margin:0}
.card{background:var(--g);backdrop-filter:blur(16px);border-radius:var(--r);padding:16px;
  margin-bottom:10px;border:1px solid rgba(255,255,255,.78);box-shadow:var(--sh);
  transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.ct{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--ink)}
.cs{font-size:11px;color:var(--sub);margin-top:2px}
.tag{display:inline-block;font-size:9.5px;font-weight:500;letter-spacing:.8px;padding:2px 9px;
  border-radius:20px;margin:3px 2px 0 0;background:rgba(232,84,122,.1);color:var(--p1);
  border:1px solid rgba(232,84,122,.2)}
.btn{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border:none;border-radius:50px;
  padding:10px 22px;font-family:'Jost',sans-serif;font-weight:500;font-size:12px;letter-spacing:.5px;
  cursor:pointer;box-shadow:0 4px 18px rgba(232,84,122,.3);transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,84,122,.42)}
.btns{background:rgba(232,84,122,.09);color:var(--deep);border:1px solid rgba(232,84,122,.18);
  border-radius:50px;padding:6px 15px;font-family:'Jost',sans-serif;font-weight:500;font-size:11px;
  cursor:pointer;transition:all .18s}
.btns:hover{background:rgba(232,84,122,.17)}
.btic{background:none;border:none;cursor:pointer;opacity:.5;transition:all .18s;padding:4px;
  display:flex;align-items:center;justify-content:center}
.btic:hover{opacity:1;transform:scale(1.2)}
.inp{background:rgba(255,255,255,.88);border:1.5px solid rgba(232,84,122,.18);border-radius:14px;
  padding:10px 14px;color:var(--ink);font-size:13px;width:100%;font-family:'Jost',sans-serif;
  outline:none;transition:border .2s,box-shadow .2s}
.inp:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(232,84,122,.1)}
.inp::placeholder{color:var(--ghost)}
textarea.inp{resize:vertical;min-height:58px}
.pgt{flex:1;height:5px;background:rgba(232,84,122,.12);border-radius:20px;overflow:hidden}
.pgf{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--p1),var(--p3));
  transition:width .7s cubic-bezier(.34,1.2,.64,1)}
.div{height:1px;background:linear-gradient(90deg,transparent,rgba(232,84,122,.18),transparent);margin:16px 0}
.em{text-align:center;color:var(--ghost);font-size:12px;padding:30px 0;font-style:italic;
  font-family:'Cormorant Garamond',serif}

/* MODAL */
.ov{position:fixed;inset:0;z-index:200;background:rgba(61,16,32,.22);
  backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:900px){.ov{align-items:center}}
.modal{background:rgba(255,248,251,.98);border-radius:32px 32px 0 0;padding:22px 22px 40px;
  width:100%;max-width:480px;max-height:88vh;overflow-y:auto;
  border-top:1px solid rgba(255,255,255,.95);
  box-shadow:0 -20px 70px rgba(191,58,94,.2);animation:mUp .3s cubic-bezier(.34,1.1,.64,1)}
@media(min-width:900px){.modal{border-radius:28px;animation:mFd .25s ease}}
@keyframes mUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes mFd{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.mh{width:36px;height:3px;background:var(--p4);border-radius:10px;margin:0 auto 20px}
@media(min-width:900px){.mh{display:none}}
.mt{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--ink);margin-bottom:20px}
.fg{display:flex;flex-direction:column;gap:13px}
.fl{font-size:9.5px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.ma{display:flex;gap:10px;margin-top:22px}
.mcan{flex:1;background:rgba(232,84,122,.09);color:var(--sub);border:none;border-radius:14px;
  padding:12px;font-weight:500;cursor:pointer;font-family:'Jost',sans-serif}
.msav{flex:2;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border:none;
  border-radius:14px;padding:12px;font-weight:600;cursor:pointer;font-family:'Jost',sans-serif;
  box-shadow:0 4px 16px rgba(232,84,122,.3)}

/* INSTALL BANNER */
.ib{display:none;position:fixed;bottom:82px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-radius:18px;
  padding:12px 18px;box-shadow:var(--sh2);border:1px solid rgba(255,255,255,.82);z-index:85;
  align-items:center;gap:12px;max-width:380px;width:calc(100% - 32px);animation:fu .4s ease}
.ib.show{display:flex}
@media(min-width:900px){.ib{display:none!important}}

/* POMODORO */
.pomo{background:linear-gradient(145deg,rgba(255,240,246,.92),rgba(252,219,229,.72));
  backdrop-filter:blur(20px);border-radius:28px;padding:26px 18px 22px;margin-bottom:16px;
  border:1px solid rgba(255,255,255,.82);box-shadow:var(--sh2);text-align:center;
  position:relative;overflow:hidden}
.pomo::before{content:'';position:absolute;top:-50px;right:-50px;width:140px;height:140px;
  border-radius:50%;background:radial-gradient(circle,rgba(232,84,122,.07),transparent 70%);pointer-events:none}
.phdr{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:14px;
  color:var(--sub);margin-bottom:16px}
.pills{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.pill{background:rgba(255,255,255,.65);color:var(--sub);border:1px solid rgba(232,84,122,.15);
  border-radius:50px;padding:5px 14px;font-size:10px;font-weight:500;cursor:pointer;
  font-family:'Jost',sans-serif;transition:all .22s}
.pill.on{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border-color:transparent;
  box-shadow:0 4px 16px rgba(232,84,122,.3)}
.pillc{background:rgba(255,255,255,.55);color:var(--p1);border:1px dashed rgba(232,84,122,.3);
  border-radius:50px;padding:5px 14px;font-size:10px;font-weight:500;cursor:pointer;
  font-family:'Jost',sans-serif;transition:all .22s}
.pillc.on{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border-color:transparent}
.cp{background:rgba(255,255,255,.8);border-radius:18px;padding:16px;margin-bottom:16px;
  border:1px solid rgba(232,84,122,.15);animation:fu .22s ease}
.cp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.cp-f{display:flex;flex-direction:column;gap:5px}
.cp-l{font-size:9px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;text-align:center}
.cp-w{display:flex;align-items:center;background:var(--p5);border:1.5px solid rgba(232,84,122,.15);
  border-radius:12px;overflow:hidden}
.cp-b{background:none;border:none;padding:0 11px;height:40px;font-size:16px;cursor:pointer;
  color:var(--p1);font-weight:600}
.cp-n{width:100%;background:none;border:none;text-align:center;font-size:15px;font-weight:600;
  color:var(--ink);font-family:'Cormorant Garamond',serif;outline:none;padding:8px 0}
.rw{position:relative;width:185px;height:185px;margin:0 auto 6px}
.rw svg{transform:rotate(-90deg);filter:drop-shadow(0 6px 18px rgba(232,84,122,.17))}
.ri{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.rt{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:48px;color:var(--ink);
  letter-spacing:-3px;line-height:1}
.rm{font-size:9px;font-weight:600;color:var(--sub);letter-spacing:2px;text-transform:uppercase}
.pbtns{display:flex;gap:10px;justify-content:center;margin-top:18px}
.psess{font-size:10px;color:var(--ghost);margin-top:10px}

/* PLAYLISTS */
.plr{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.plr::-webkit-scrollbar{display:none}
.plc{background:linear-gradient(145deg,rgba(255,255,255,.9),rgba(252,219,229,.55));border-radius:22px;
  padding:16px 13px;min-width:112px;text-align:center;flex-shrink:0;
  border:1px solid rgba(255,255,255,.88);box-shadow:0 4px 18px rgba(232,84,122,.1);
  cursor:pointer;transition:all .22s}
.plc:hover{transform:translateY(-5px);box-shadow:0 12px 32px rgba(232,84,122,.2)}
.ple{margin-bottom:8px;display:flex;justify-content:center}
.pln{font-size:10px;font-weight:500;color:var(--ink);line-height:1.4}
.pla{display:flex;gap:4px;justify-content:center;margin-top:8px}
.plb{background:rgba(232,84,122,.09);color:var(--p1);border:none;border-radius:8px;padding:3px 8px;
  font-size:10px;cursor:pointer;font-weight:500;font-family:'Jost',sans-serif;transition:all .15s}

/* MUSIC */
.mhero{background:linear-gradient(135deg,rgba(232,84,122,.1),rgba(249,173,191,.18));border-radius:22px;
  padding:18px;margin-bottom:14px;border:1px solid rgba(255,255,255,.75);box-shadow:var(--sh)}
.mudisc{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--p4),var(--p3));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 4px 14px rgba(232,84,122,.18)}

/* WISHLIST */
.whero{background:linear-gradient(135deg,rgba(249,173,191,.2),rgba(252,219,229,.3));border-radius:22px;
  padding:18px;margin-bottom:14px;border:1px solid rgba(255,255,255,.75);box-shadow:var(--sh)}
.htitle{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--deep)}
.hsub{font-size:11px;color:var(--sub);letter-spacing:.3px;margin-top:3px}
.hchips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.hchip{font-size:10px;font-weight:500;color:var(--p1);background:rgba(232,84,122,.1);
  border:1px solid rgba(232,84,122,.2);border-radius:20px;padding:3px 10px}
.wcard{background:var(--g);backdrop-filter:blur(14px);border-radius:20px;padding:14px 16px;
  margin-bottom:8px;border:1px solid rgba(255,255,255,.72);
  box-shadow:0 4px 16px rgba(232,84,122,.07);display:flex;align-items:center;gap:12px;
  transition:transform .18s}
.wcard:hover{transform:translateY(-2px)}
.wchk{width:22px;height:22px;border-radius:8px;flex-shrink:0;
  border:1.5px solid rgba(232,84,122,.28);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .22s}
.wchk.on{background:linear-gradient(135deg,var(--p1),var(--p2));border-color:transparent;
  box-shadow:0 3px 10px rgba(232,84,122,.3)}

/* STUDY */
.sprg{display:flex;align-items:center;gap:9px;margin-top:9px}
.sbtns{display:flex;gap:5px;margin-top:9px}
.stb{background:rgba(232,84,122,.07);color:var(--deep);border:1px solid rgba(232,84,122,.12);
  border-radius:50px;padding:4px 12px;font-size:10px;font-weight:500;cursor:pointer;
  font-family:'Jost',sans-serif;transition:all .15s}
.stb:hover{background:rgba(232,84,122,.16)}
.stb.done{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border-color:transparent}

/* STREAMS */
.ldot{width:6px;height:6px;border-radius:50%;background:var(--p1);display:inline-block;
  animation:pu 1.5s infinite;flex-shrink:0}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.6)}}

/* KIRA */
.kscene{background:linear-gradient(165deg,rgba(255,228,238,.88),rgba(249,173,191,.55));
  border-radius:26px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;
  min-height:180px;border:1px solid rgba(255,255,255,.78);box-shadow:var(--sh)}
.kscene::before{content:'';position:absolute;bottom:0;left:0;right:0;height:36px;
  background:linear-gradient(180deg,transparent,rgba(232,84,122,.06));pointer-events:none}
.ksp{position:absolute;bottom:12px;left:20%;transition:left .07s linear,transform .14s;cursor:pointer}
.kmsg{background:rgba(255,255,255,.84);border-radius:16px;padding:10px 16px;margin-bottom:11px;
  font-style:italic;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--ink);
  text-align:center;border:1px solid rgba(255,255,255,.78);min-height:40px;
  display:flex;align-items:center;justify-content:center;transition:all .3s}
.kstats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.kstat{background:rgba(255,255,255,.72);border-radius:18px;padding:12px 10px;text-align:center;
  border:1px solid rgba(255,255,255,.72)}
.ksl{font-size:8.5px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1.2px}
.ksv{font-size:13px;font-weight:600;color:var(--deep);margin-top:4px}
.kacts{display:flex;gap:7px;margin-top:10px}
.kab{flex:1;background:rgba(255,255,255,.75);color:var(--deep);
  border:1px solid rgba(255,255,255,.88);border-radius:18px;padding:11px 4px;
  font-weight:500;font-size:9.5px;cursor:pointer;font-family:'Jost',sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.kab:hover{background:linear-gradient(135deg,rgba(252,219,229,.8),rgba(249,173,191,.5));
  transform:translateY(-3px)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--p4);border-radius:4px}
</style>
</head>
<body>
<div class="shell">
  <header class="hdr">
    <div style="display:flex;flex-direction:column;align-items:center">
      <div class="logo-name">Ludmila</div>
      <div class="logo-dots"><span class="logo-dot"></span><span class="logo-dot"></span><span class="logo-dot"></span></div>
    </div>
  </header>
  <nav class="ndesk" id="nd">
    <div class="dlogo">
      <div class="dlogo-name">Ludmila</div>
      <div class="dlogo-sub">mi espacio personal</div>
      <div class="dlogo-dots"><span class="dlogo-dot"></span><span class="dlogo-dot"></span><span class="dlogo-dot"></span></div>
    </div>
    <div class="dinst" id="di" style="display:none">
      <button class="dinst-btn" id="dib">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Instalar Ludmila
      </button>
    </div>
  </nav>

function saveState(){
  try{
    var toSave=Object.assign({},S);
    toSave.pit=null;toSave.modal=null;toSave.mid=null;
    toSave.pomo=Object.assign({},S.pomo,{run:false});
    toSave.kira=Object.assign({},S.kira,{wi:null});
    localStorage.setItem(LS_KEY,JSON.stringify(toSave));
  }catch(e){}
}

function loadState(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(!raw)return null;
    var saved=JSON.parse(raw);
    // merge with default to handle new keys
    var merged=Object.assign({},DEFAULT_S,saved);
    merged.pomo=Object.assign({},DEFAULT_S.pomo,saved.pomo||{});
    merged.cal=Object.assign({},DEFAULT_S.cal,saved.cal||{});
    merged.kira=Object.assign({},DEFAULT_S.kira,saved.kira||{},{wi:null});
    merged.pit=null;merged.modal=null;merged.mid=null;
    return merged;
  }catch(e){return null;}
}

// ═══════════════════ POMODORO ═══════════════════
var PM=[{l:'25 min',w:25,b:5},{l:'15 min',w:15,b:3},{l:'50 min',w:50,b:10}];
function pW(){return S.pomo.mi===3?S.pomo.cw:PM[S.pomo.mi].w;}
function pB(){return S.pomo.mi===3?S.pomo.cb:PM[S.pomo.mi].b;}
function pStart(){
  if(S.pit)return;S.pomo.run=true;
  S.pit=setInterval(function(){
    S.pomo.secs--;
    if(S.pomo.secs<=0){
      clearInterval(S.pit);S.pit=null;S.pomo.run=false;
      if(S.pomo.isW){S.pomo.sess++;S.pomo.isW=false;S.pomo.secs=pB()*60;saveState();}
      else{S.pomo.isW=true;S.pomo.secs=pW()*60;}
    }
    if(S.sec==='study')uRing();
  },1000);
}
function pPause(){clearInterval(S.pit);S.pit=null;S.pomo.run=false;uRing();}
function pReset(){pPause();S.pomo.isW=true;S.pomo.secs=pW()*60;if(S.sec==='study')uRing();}
function pMode(i){S.pomo.mi=i;S.pomo.showC=(i===3);pReset();if(S.sec==='study')rStudy();}
function applyC(){
  var w=parseInt(document.getElementById('cpw').value)||25;
  var b=parseInt(document.getElementById('cpb').value)||5;
  S.pomo.cw=Math.max(1,Math.min(120,w));S.pomo.cb=Math.max(1,Math.min(60,b));
  pReset();if(S.sec==='study')rStudy();
}
function stepC(id,d){var e=document.getElementById(id);if(!e)return;var v=parseInt(e.value)||0;e.value=Math.max(1,Math.min(id==='cpw'?120:60,v+d));}
function uRing(){
  var p=S.pomo,tot=(p.isW?pW():pB())*60,pr=1-p.secs/tot,R=80,circ=2*Math.PI*R,dash=circ*(1-pr);
  var mn=String(Math.floor(p.secs/60)).padStart(2,'0'),sc=String(p.secs%60).padStart(2,'0');
  var a=document.getElementById('parc');if(a)a.setAttribute('stroke-dashoffset',dash);
  var t=document.getElementById('ptim');if(t)t.textContent=mn+':'+sc;
  var b=document.getElementById('pbtn');if(b)b.textContent=p.run?'Pausar':'Iniciar';
  var h=document.getElementById('phdr');if(h)h.textContent=p.isW?'enfocandote':'descansando';
  var s=document.getElementById('pses');if(s)s.textContent=p.sess+' sesion'+(p.sess!==1?'es':'')+' completada'+(p.sess!==1?'s':'');
}

    var el=document.getElementById('ksp');
    if(el){el.style.left=k.x+'%';el.style.transform=k.dir<0?'scaleX(-1)':'scaleX(1)';}
  },60);
}
function kStop(){if(S.kira.wi){clearInterval(S.kira.wi);S.kira.wi=null;}}

function kAct(t){
  var k=S.kira,ms=KMSGS[t];k.msg=ms[Math.floor(Math.random()*ms.length)];
  if(t==='feed'){k.hunger=Math.min(100,k.hunger+25);k.happy=Math.min(100,k.happy+5);}
  if(t==='pet'){k.happy=Math.min(100,k.happy+20);}
  if(t==='play'){k.happy=Math.min(100,k.happy+15);k.energy=Math.max(0,k.energy-10);}
  if(t==='sleep'){k.energy=Math.min(100,k.energy+30);k.happy=Math.min(100,k.happy+5);}
  var sp=document.getElementById('ksp');
  if(sp){var base=k.dir<0?'scaleX(-1)':'scaleX(1)';sp.style.transform=base+' translateY(-12px) scale(1.1)';setTimeout(function(){if(sp)sp.style.transform=base;},320);}
  var mg=document.getElementById('kmsg');if(mg)mg.textContent=k.msg;
  function uB(bi,bv,v){var e=document.getElementById(bi);if(e)e.style.width=Math.round(v)+'%';var e2=document.getElementById(bv);if(e2)e2.textContent=Math.round(v)+'%';}
  uB('kbh','kvh',k.hunger);uB('kbha','kvha',k.happy);uB('kbe','kve',k.energy);
  saveState();
}

// CALENDAR
var calSel=null; // selected date string

function rCal(){
  var y=S.cal.y,m=S.cal.m,ev=S.cal.ev;
  var MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var DN=['Lu','Ma','Mi','Ju','Vi','Sa','Do'];
  var td=new Date();
  var tds=td.getFullYear()+'-'+String(td.getMonth()+1).padStart(2,'0')+'-'+String(td.getDate()).padStart(2,'0');
  var first=new Date(y,m,1),sd=first.getDay()-1;if(sd<0)sd=6;
  var dim=new Date(y,m+1,0).getDate(),pd=new Date(y,m,0).getDate();

  // count events this month
  var evCount=0;
  for(var k in ev){if(k.startsWith(y+'-'+String(m+1).padStart(2,'0')))evCount+=ev[k].length;}

  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'+
    '<button class="btic" onclick="cN(-1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>'+
    '<div style="text-align:center">'+
    '<div style="font-family:\'Cormorant Garamond\',serif;font-size:16px;color:var(--ink);font-weight:600">'+MN[m]+' '+y+'</div>'+
    (evCount>0?'<div style="font-size:9px;color:var(--p1);font-weight:600;letter-spacing:.5px;margin-top:1px">'+evCount+' evento'+(evCount!==1?'s':'')+'</div>':'<div style="font-size:9px;color:var(--ghost);margin-top:1px">sin eventos</div>')+
    '</div>'+
    '<button class="btic" onclick="cN(1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>'+
    '</div>'+
    '<div style="height:1px;background:linear-gradient(90deg,transparent,rgba(232,84,122,.15),transparent);margin:8px 0 10px"></div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">'+
    DN.map(function(d){return'<div style="font-size:8px;font-weight:700;color:var(--ghost);text-align:center;padding:3px 0;letter-spacing:.3px">'+d+'</div>';}).join('');

  for(var i=0;i<sd;i++)h+='<div style="font-size:11px;text-align:center;padding:6px 1px;color:var(--p4)">'+(pd-sd+1+i)+'</div>';

  for(var d=1;d<=dim;d++){
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isTd=ds===tds;
    var hasEv=ev[ds]&&ev[ds].length;
    var isSel=calSel===ds;
    var bg='',col='color:var(--ink)',extra='';
    if(isTd)      {bg='background:linear-gradient(135deg,#E8547A,#F2789A);';col='color:#fff;font-weight:700;';}
    else if(isSel){bg='background:rgba(232,84,122,.15);';col='color:var(--p1);font-weight:600;';}
    else if(hasEv){bg='background:rgba(232,84,122,.07);';}
    if(hasEv&&!isTd) extra='<span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:'+(isSel?'var(--p1)':'var(--p2)')+';display:block"></span>';
    h+='<div onclick="selDay(\''+ds+'\')" style="font-size:11px;text-align:center;padding:6px 1px;position:relative;border-radius:10px;cursor:pointer;transition:all .15s;'+bg+col+'">'+d+extra+'</div>';
  }
  h+='</div>';

  // Selected day event panel
  if(calSel&&ev[calSel]&&ev[calSel].length){
    var parts=calSel.split('-');
    var dLabel=parseInt(parts[2])+' de '+MN[parseInt(parts[1])-1];
    h+='<div style="margin-top:12px;background:linear-gradient(135deg,rgba(232,84,122,.08),rgba(249,173,191,.12));border-radius:16px;padding:12px 14px;border:1px solid rgba(232,84,122,.18)">'+
      '<div style="font-size:10px;font-weight:700;color:var(--p1);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">'+
      '<svg width="11" height="11" viewBox="0 0 24 24" fill="var(--p1)" style="vertical-align:middle;margin-right:4px"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6" stroke="white" stroke-width="2.5"/><line x1="8" y1="2" x2="8" y2="6" stroke="white" stroke-width="2.5"/><line x1="3" y1="10" x2="21" y2="10" stroke="white" stroke-width="2"/></svg>'+
      dLabel+'</div>'+
      ev[calSel].map(function(evt,i){return(
        '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;'+(i>0?'border-top:1px solid rgba(232,84,122,.1)':'')+'">'+
        '<div style="width:6px;height:6px;border-radius:50%;background:var(--p1);flex-shrink:0"></div>'+
        '<div style="font-size:12px;color:var(--ink);font-weight:500;flex:1">'+evt+'</div>'+
        '<button onclick="delEv(\''+calSel+'\','+i+')" class="btic" style="opacity:.4;padding:2px">'+IC['trash']+'</button>'+
        '</div>'
      );}).join('')+
      '</div>';
  } else if(calSel){
    var parts2=calSel.split('-');
    var dLabel2=parseInt(parts2[2])+' de '+MN[parseInt(parts2[1])-1];
    h+='<div style="margin-top:10px;background:rgba(232,84,122,.05);border-radius:14px;padding:10px 14px;border:1px dashed rgba(232,84,122,.2);text-align:center">'+
      '<div style="font-size:11px;color:var(--sub);font-style:italic">'+dLabel2+' — sin eventos</div>'+
      '<button onclick="mo(\'event\')" class="btns" style="margin-top:8px;font-size:10px">+ agregar evento</button>'+
      '</div>';
  }

  // All upcoming events for current month
  var allEvKeys=Object.keys(ev).filter(function(k){return k.startsWith(y+'-'+String(m+1).padStart(2,'0'));}).sort();
  if(allEvKeys.length){
    h+='<div style="margin-top:14px;border-top:1px solid rgba(232,84,122,.12);padding-top:12px">'+
      '<div style="font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">Todos los eventos del mes</div>';
    allEvKeys.forEach(function(k){
      var parts3=k.split('-');
      var dl=parseInt(parts3[2])+' de '+MN[parseInt(parts3[1])-1];
      var isToday=k===tds;
      ev[k].forEach(function(evt,i){
        h+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(232,84,122,.07);cursor:pointer" onclick="selDay(\''+k+'\')">'+
          '<div style="font-size:10px;font-weight:700;color:'+(isToday?'var(--p1)':'var(--sub)')+';min-width:40px;text-align:center;background:'+(isToday?'rgba(232,84,122,.1)':'transparent')+';border-radius:8px;padding:2px 4px">'+parseInt(parts3[2])+'</div>'+
          '<div style="flex:1;font-size:12px;color:var(--ink);font-weight:500">'+evt+'</div>'+
          '<button onclick="event.stopPropagation();delEv(\''+k+'\','+i+')" class="btic" style="opacity:.35;padding:2px">'+IC['trash']+'</button>'+
          '</div>';
      });
    });
    h+='</div>';
  }

  return h;
}
function cN(d){S.cal.m+=d;if(S.cal.m>11){S.cal.m=0;S.cal.y++;}if(S.cal.m<0){S.cal.m=11;S.cal.y--;}saveState();rStudy();}
function selDay(ds){calSel=(calSel===ds?null:ds);rStudy();}
function delEv(ds,idx){if(S.cal.ev[ds]){S.cal.ev[ds].splice(idx,1);if(!S.cal.ev[ds].length)delete S.cal.ev[ds];}saveState();rStudy();}

    (r.ing?'<div style="font-size:11px;color:var(--sub);margin-top:7px"><span style="font-weight:600">Ingredientes:</span> '+r.ing+'</div>':'')+
    (r.steps?'<div style="font-size:11px;color:var(--sub);margin-top:4px"><span style="font-weight:600">Preparacion:</span> '+r.steps+'</div>':'')+
    '</div>'+
    '<div style="display:flex;gap:3px">'+
    '<button class="btic" onclick="mo(\'recipe\','+r.id+')">'+IC['pencil']+'</button>'+
    '<button class="btic" onclick="dRec('+r.id+')">'+IC['trash']+'</button>'+
    '</div></div></div>'
  );}).join('');
  C('<div class="tr"><div class="slbl">Mis recetas</div><button class="btns" onclick="mo(\'recipe\')">+ agregar</button></div>'+
    (h||'<div class="em">Agrega tu primera receta!</div>'));
}

// KIRA — original pixel cat shape, GREEN eyes
var CAT='<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 16 16" style="image-rendering:pixelated;display:block">'+

  '<svg width="16" height="16" viewBox="0 0 24 24" fill="rgba(242,120,154,0.3)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
  '<svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(249,173,191,0.4)"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>',
];

function rKira(){
  var k=S.kira;
  C('<div style="text-align:center;margin-bottom:14px">'+
    '<div class="slbl" style="justify-content:center;font-size:16px;font-family:\'Cormorant Garamond\',serif">Kira - mi gatita</div>'+
    '</div>'+
    '<div class="kmsg" id="kmsg">'+k.msg+'</div>'+
    '<div class="kscene">'+
    '<div style="position:absolute;top:10px;left:12px;pointer-events:none">'+KDECO[0]+'</div>'+

    '<div class="kstat"><div class="ksl">Hambre</div><div class="pgt" style="margin-top:5px"><div class="pgf" id="kbh" style="width:'+Math.round(k.hunger)+'%"></div></div><div class="ksv" id="kvh">'+Math.round(k.hunger)+'%</div></div>'+
    '<div class="kstat"><div class="ksl">Felicidad</div><div class="pgt" style="margin-top:5px"><div class="pgf" id="kbha" style="width:'+Math.round(k.happy)+'%"></div></div><div class="ksv" id="kvha">'+Math.round(k.happy)+'%</div></div>'+
    '<div class="kstat"><div class="ksl">Energia</div><div class="pgt" style="margin-top:5px"><div class="pgf" id="kbe" style="width:'+Math.round(k.energy)+'%"></div></div><div class="ksv" id="kve">'+Math.round(k.energy)+'%</div></div>'+

    '</div>'+

    '<button class="kab" onclick="kAct(\'feed\')">'+IC['food']+'<span>Comida</span></button>'+
    '<button class="kab" onclick="kAct(\'pet\')">'+IC['hug']+'<span>Mimos</span></button>'+
    '<button class="kab" onclick="kAct(\'play\')">'+IC['play2']+'<span>Jugar</span></button>'+
    '<button class="kab" onclick="kAct(\'sleep\')">'+IC['sleep2']+'<span>Dormir</span></button>'+

  kWalk();
}

function tFav(id){S.music=S.music.map(function(s){return s.id===id?Object.assign({},s,{fav:!s.fav}):s;});saveState();rMusic();}
function dMu(id){S.music=S.music.filter(function(s){return s.id!==id;});saveState();rMusic();}
function dPL(id){S.plists=S.plists.filter(function(s){return s.id!==id;});saveState();rMusic();}
function dSt(id){S.study=S.study.filter(function(s){return s.id!==id;});saveState();rStudy();}
function uPr(id,d){S.study=S.study.map(function(s){return s.id!==id?s:Object.assign({},s,{prog:Math.min(100,Math.max(0,d===100?100:s.prog+d))});});saveState();rStudy();}
function tWish(id){S.wish=S.wish.map(function(w){return w.id===id?Object.assign({},w,{done:!w.done}):w;});saveState();rWishlist();}
function dWish(id){S.wish=S.wish.filter(function(w){return w.id!==id;});saveState();rWishlist();}
function tLive(id){S.streams=S.streams.map(function(s){return s.id===id?Object.assign({},s,{live:!s.live}):s;});saveState();rStreams();}
function dStr(id){S.streams=S.streams.filter(function(s){return s.id!==id;});saveState();rStreams();}
function dRec(id){S.recipes=S.recipes.filter(function(r){return r.id!==id;});saveState();rRecipes();}

// NAV
function show(sec){
  S.sec=sec;
  saveState();
  if(sec!=='kira')kStop();
  bNav();
  if(sec==='study')         rStudy();
  else if(sec==='music')    rMusic();
  else if(sec==='wishlist') rWishlist();
  else if(sec==='streams')  rStreams();
  else if(sec==='recipes')  rRecipes();
  else if(sec==='kira')     rKira();
}

bNav();
show('study');
</script>
